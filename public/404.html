<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script>
    // Store the full path that led to the 404 page in sessionStorage
    sessionStorage.redirect = location.href;
  </script>
  <!-- Use a meta refresh to redirect to the root of the site -->
  <meta http-equiv="refresh" content="0;URL='/'">
</head>
<body>
  <p>If you are not redirected automatically, follow this <a href="/">link to the home page</a>.</p>
</body>
</html>
