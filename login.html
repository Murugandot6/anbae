<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - anbae</title>
    
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons CDN for email/lock icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts for a consistent look -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap');
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #f9fafb; /* A very light gray background */
        }
    </style>
</head>
<body>

    <div class="min-h-screen flex flex-col items-center justify-center p-4">
        
        <!-- Login Card -->
        <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-sm">
            
            <!-- Logo inside the card -->
            <div class="text-center mb-6">
                <h1 class="text-5xl font-extrabold tracking-tighter">
                    <span class="text-blue-500">a</span>
                    <span class="text-red-500">n</span>
                    <span class="text-yellow-500">b</span>
                    <span class="text-blue-500">a</span>
                    <span class="text-green-500">e</span>
                </h1>
            </div>
            
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-8">Welcome Back!</h2>

            <!-- THIS IS THE FIX: Added id="login-form" to connect with app.js -->
            <form id="login-form" class="space-y-6">
                <!-- Email Input -->
                <div>
                    <label for="email" class="text-sm font-semibold text-gray-600">Email</label>
                    <div class="relative mt-1">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="mail" class="h-5 w-5 text-gray-400"></i>
                        </div>
                        <input 
                            id="email" 
                            name="email" 
                            type="email" 
                            required 
                            placeholder="your.email@example.com"
                            class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-pink-500 focus:border-pink-500 sm:text-sm"
                        >
                    </div>
                </div>

                <!-- Password Input -->
                <div>
                    <label for="password" class="text-sm font-semibold text-gray-600">Password</label>
                    <div class="relative mt-1">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="lock" class="h-5 w-5 text-gray-400"></i>
                        </div>
                        <input 
                            id="password" 
                            name="password" 
                            type="password" 
                            required 
                            placeholder="Your password"
                            class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-pink-500 focus:border-pink-500 sm:text-sm"
                        >
                    </div>
                </div>

                <!-- Sign In Button -->
                <div>
                    <button 
                        type="submit" 
                        class="w-full flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-pink-500 hover:bg-pink-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-pink-500 transition-colors"
                    >
                        Sign In
                    </button>
                </div>
            </form>

            <!-- Back to Home Link -->
            <div class="text-center mt-6">
                <a href="index.html" class="text-sm text-gray-500 hover:text-gray-700 hover:underline">
                    ← Back to Home
                </a>
            </div>
        </div>

        <!-- Footer -->
        <footer class="absolute bottom-6 text-sm text-gray-500">
            Built with love for better communication
        </footer>

    </div>

    <!-- Script to render Lucide icons -->
    <script>
        lucide.createIcons();
    </script>
<script type="module" src="app.js"></script>
</body>
</html>
