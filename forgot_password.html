<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anbae - Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Import Inter font for a consistent look */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fce7f3; /* Light pink background for consistency */
            color: #202124;
        }
        /* Custom input field styling to match the new design */
        .custom-input {
            border-color: #fbcfe8; /* Light pink border */
            border-width: 1px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
        }
        .custom-input:focus {
            outline: none;
            border-color: #ec4899; /* Stronger pink on focus */
            box-shadow: 0 0 0 2px rgba(236, 72, 153, 0.3); /* Pink ring effect */
        }
        /* Custom button styling for a consistent primary button look */
        .pink-button {
            background-color: #ec4899; /* Pink color */
            color: white;
            font-weight: 600; /* Semibold */
            transition: background-color 0.2s ease-in-out, transform 0.1s ease-in-out;
        }
        .pink-button:hover {
            background-color: #db2777; /* Darker pink on hover */
            transform: translateY(-1px); /* Slight lift effect */
        }
        .pink-button:active {
            background-color: #be185d; /* Even darker on active */
            transform: translateY(0);
        }
         /* Message box styling (for alerts) */
        .message-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            display: none; /* Hidden by default */
            text-align: center;
        }
        .message-box button {
            margin-top: 15px;
            background-color: #ec4899;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <main class="flex flex-col items-center w-full max-w-md bg-white p-8 rounded-2xl shadow-xl">

        <!-- Top Heart Icon -->
        <div class="mb-6 bg-pink-100 p-4 rounded-full flex items-center justify-center" style="width: 80px; height: 80px; box-shadow: 0 0 0 5px #fce7f3;">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-pink-500" viewBox="0 0 20 20" fill="currentColor">
                <path fill-rule="evenodd" d="M3.172 5.172a4 4 0 015.656 0L10 6.343l1.172-1.171a4 4 0 115.656 5.656L10 17.657l-6.828-6.829a4 4 0 010-5.656z" clip-rule="evenodd" />
            </svg>
        </div>

        <!-- Anbae Logo/Title -->
        <h1 class="text-5xl font-bold tracking-tight mb-8">
            <span class="text-blue-500">a</span><span class="text-red-500">n</span><span class="text-yellow-500">b</span><span class="text-blue-500">a</span><span class="text-green-500">e</span>
        </h1>

        <h2 class="text-2xl font-semibold mb-6 text-gray-800">Reset your password</h2>
        <p class="text-center text-sm text-gray-600 mb-6">Enter your email address below and we'll send you a link to reset your password.</p>

        <form id="forgot-password-form" class="w-full space-y-5">
            <div>
                <label for="email" class="block text-left text-sm font-medium text-gray-700 mb-1 flex items-center gap-1">
                    <!-- Email Icon -->
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-pink-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.5a2.5 2.5 0 01-5 0V12" />
                    </svg>
                    Email address
                </label>
                <input
                    type="email"
                    id="email"
                    name="email"
                    required
                    class="custom-input w-full px-4 py-2 border rounded-lg shadow-sm sm:text-sm"
                    placeholder="you@example.com"
                >
            </div>

            <button
                type="submit"
                class="pink-button w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm"
            >
                Send Reset Link
            </button>
        </form>

        <div class="mt-6 text-center text-sm text-gray-600">
            Remembered your password?
            <a href="login.html" class="font-medium text-pink-600 hover:text-pink-500 transition-colors">Login here</a>
        </div>

        <a href="index.html" class="mt-8 text-gray-600 hover:text-gray-900 transition-colors flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
            </svg>
            Back to Home
        </a>
    </main>

    <!-- Custom message box for alerts -->
    <div id="messageBox" class="message-box">
        <p id="messageText"></p>
        <button id="messageBoxClose">OK</button>
    </div>

    <script type="module">
        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyA8QfLoifA2-DjldYaMBeIge1D6TbRpBWw",
            authDomain: "summa-57ad5.firebaseapp.com",
            projectId: "summa-57ad5",
            storageBucket: "summa-57ad5.firebasestorage.app",
            messagingSenderId: "472212537134",
            appId: "1:472212537134:web:fc930ea95fa9b7ffc4c4bf"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('forgot-password-form').addEventListener('submit', async function(event) {
            event.preventDefault(); // Prevent default form submission

            const email = document.getElementById('email').value;

            if (!email) {
                showMessage("Please enter your email address.");
                return;
            }

            try {
                await sendPasswordResetEmail(auth, email);
                showMessage("Password reset link sent to your email! Please check your inbox.", () => {
                    window.location.href = 'login.html'; // Redirect to login after sending link
                });
            } catch (error) {
                console.error("Error sending password reset email:", error);
                let errorMessage = "Failed to send password reset link. Please try again.";
                if (error.code === 'auth/invalid-email') {
                    errorMessage = "Invalid email address.";
                } else if (error.code === 'auth/user-not-found') {
                    errorMessage = "No user found with that email address.";
                }
                showMessage(errorMessage);
            }
        });

        // Function to show custom message box
        function showMessage(message, callback) {
            const messageBox = document.getElementById('messageBox');
            const messageText = document.getElementById('messageText');
            const messageBoxClose = document.getElementById('messageBoxClose');

            messageText.textContent = message;
            messageBox.style.display = 'block';

            messageBoxClose.onclick = () => {
                messageBox.style.display = 'none';
                if (callback) {
                    callback();
                }
            };
        }
    </script>
</body>
</html>
