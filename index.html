<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase with Separate JS</title>
</head>
<body>

    <h1>My Firebase App</h1>
    <p>Welcome, <span id="nickname-display">loading...</span></p>

    <!-- Firebase SDKs - These provide the `firebase` object -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <!-- Your custom JavaScript file - MUST be after the Firebase SDKs -->
    <script src="app.js"></script>

</body>
</html>
