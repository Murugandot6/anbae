<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>anbae</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&display=swap');
        body { font-family: 'Manrope', sans-serif; background-color: #fff; }
        /* Blinking cursor effect for the animation */
        #typing-cursor { animation: blink 1s step-end infinite; }
        @keyframes blink { from, to { border-color: transparent; } 50% { border-color: black; } }
    </style>
</head>
<body>
    <div class="min-h-screen flex flex-col items-center justify-center p-4 -mt-20">
        <main class="flex flex-col items-center w-full max-w-xl text-center">
            
            <!-- Logo -->
            <h1 class="text-8xl md:text-9xl font-extrabold tracking-tighter">
                <span class="text-blue-500">a</span><span class="text-red-500">n</span><span class="text-yellow-500">b</span><span class="text-blue-500">a</span><span class="text-green-500">e</span>
            </h1>

            <!-- Animated Search Bar Placeholder -->
            <div class="mt-8 w-full">
                <div class="relative w-full max-w-xl mx-auto">
                    <div class="mx-auto flex h-12 w-full items-center justify-between rounded-full border border-gray-200 px-5 shadow-sm hover:shadow-md transition-shadow">
                        <span id="typing-text" class="text-gray-500"></span>
                        <span id="typing-cursor" class="border-r-2 border-gray-700 h-5"></span>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div id="home-page-buttons" class="flex items-center gap-x-4 mt-8">
                <button id="login-button" class="px-6 py-2 bg-gray-100 text-gray-700 rounded-md text-sm hover:shadow-sm hover:border-gray-300 border border-transparent transition-all">
                    Login
                </button>
                <button id="register-button" class="px-6 py-2 bg-gray-100 text-gray-700 rounded-md text-sm hover:shadow-sm hover:border-gray-300 border border-transparent transition-all">
                    Register
                </button>
            </div>
        </main>
        <footer class="absolute bottom-8 text-sm text-gray-500">
            Built with love for better communication
        </footer>
    </div>
    
    <!-- This links to your central JavaScript file -->
    <script type="module" src="app.js"></script>
</body>
</html>
