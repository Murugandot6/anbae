<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to anbae</title>
    
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts & Custom Styles -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@800&display=swap');
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #fdfcff;
        }
    </style>
</head>
<body>

    <div class="min-h-screen flex flex-col items-center justify-center p-4">
        
        <main class="flex flex-col items-center gap-y-8 w-full max-w-lg text-center">
            
            <!-- Logo -->
            <h1 class="text-8xl md:text-9xl font-extrabold tracking-tighter">
                <span class="text-blue-500">a</span>
                <span class="text-red-500">n</span>
                <span class="text-yellow-500">b</span>
                <span class="text-blue-500">a</span>
                <span class="text-green-500">e</span>
            </h1>

            <!-- Subtitle -->
            <p class="text-lg text-gray-500">A private space for better communication.</p>

            <!-- Action Buttons -->
            <div class="flex items-center gap-x-4 mt-4">
                <button id="login-button" class="px-8 py-3 bg-violet-500 text-white font-bold rounded-lg hover:bg-violet-600 transition-all shadow-lg">
                    Login
                </button>
                <button id="register-button" class="px-8 py-3 bg-pink-500 text-white font-bold rounded-lg hover:bg-pink-600 transition-all shadow-lg">
                    Register
                </button>
            </div>
            
        </main>

        <!-- Footer -->
        <footer class="absolute bottom-8 text-sm text-gray-400">
            Built with love for better communication
        </footer>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <!-- Firebase Configuration and Logic -->
    <script>
        // 1. PASTE YOUR FIREBASE CONFIGURATION HERE
        const firebaseConfig = {
            apiKey: "AIza...",
            authDomain: "your-project-id.firebaseapp.com",
            projectId: "your-project-id",
            storageBucket: "your-project-id.appspot.com",
            messagingSenderId: "12345...",
            appId: "1:12345..."
        };

        // 2. Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // 3. Smart Redirect for LOGGED-IN users
        auth.onAuthStateChanged(user => {
            if (user) {
                // If the user is already logged in, they shouldn't see this page.
                // Redirect them straight to their dashboard.
                console.log("User is already logged in. Redirecting to dashboard...");
                window.location.replace('dashboard.html');
            }
            // If there's NO user, DO NOTHING. Let them stay on this homepage.
        });

        // 4. Add click handlers for the buttons
        document.getElementById('login-button').addEventListener('click', () => {
            window.location.href = 'login.html';
        });

        document.getElementById('register-button').addEventListener('click', () => {
            window.location.href = 'register.html';
        });

        // Initialize any icons if needed
        lucide.createIcons();
    </script>
</body>
</html>
